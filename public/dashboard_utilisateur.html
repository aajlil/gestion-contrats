<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Utilisateur</title>
    <link rel="stylesheet" href="/alertes.css">
</head>
<body>
<div id="cloche-notif" onclick="ouvrirAlertes()" class="cloche-notif">
    🔔
</div>
<div id="alertes-overlay" class="alertes-overlay" style="display:none;">
    <div id="alertes-panel" class="alertes-panel">
        <div class="alertes-header">
            <span class="alertes-icon">🔔</span>
            <h2 class="alertes-titre">Alertes d'expiration</h2>
            <button class="alertes-close" onclick="fermerAlertes()">✕</button>
        </div>
        <div id="alertes-liste" class="alertes-liste"></div>
    </div>
</div>

<h1>Dashboard Utilisateur</h1>

<p id="welcome"></p>

<h2>Vue d'ensemble</h2>

<p><strong>Nombre total de mes contrats :</strong> <span id="totalContrats">0</span></p>
<p><strong>Mes contrats actifs :</strong> <span id="contratsActifs">0</span></p>
<p><strong>Mes contrats expirés :</strong> <span id="contratsExpires">0</span></p>
<p><strong>Mes contrats arrivant à échéance :</strong> <span id="contratsEcheance">0</span></p>

<canvas id="graphiqueContrats"></canvas>

<br><br>

<h2>Statistiques</h2>

<p><strong>Montant total de mes contrats :</strong> <span id="montantTotal">0</span> EUR</p>

<h3>Mes contrats par fournisseur</h3>
<canvas id="graphiqueFournisseurs"></canvas>

<br><br>

<h3>Mes contrats par type</h3>
<canvas id="graphiqueTypes"></canvas>

<br><br>

<button onclick="window.location.href='/voir_contrat_utilisateur.html'">Voir mes contrats</button>
<br><br>

<button onclick="window.location.href='/mes_document.html'">Mes documents</button>
<br><br>

<button onclick="window.location.href='/calendrier_contrat.html'">Voir le calendrier des échéances</button>
<br><br>

<button id="btnLogout">Se déconnecter</button>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/alertes.js"></script>
<script src="/dashboard_utilisateur.js"></script>

</body>
</html>
