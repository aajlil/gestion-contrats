<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Profil</title>
    <link rel="stylesheet" href="/profil.css">
</head>
<body>

<div class="page-container">
    <div class="page-header">
        <p class="page-label">Compte utilisateur</p>
        <h1>Mon profil</h1>
    </div>

    <p id="message"></p>

    <section class="bloc-section">
        <h2>Informations du compte</h2>
        <div class="info-ligne">
            <strong>Nom :</strong>
            <span id="nom"></span>
        </div>

        <div class="info-ligne">
            <strong>Prénom :</strong>
            <span id="prenom"></span>
        </div>

        <div class="info-ligne">
            <strong>Identifiant :</strong>
            <span id="identifiant"></span>
        </div>

        <div class="info-ligne">
            <strong>Email :</strong>
            <span id="email"></span>
        </div>

        <div class="info-ligne">
            <strong>Rôle :</strong>
            <span id="role"></span>
        </div>
    </section>
    <button id="btnRetour" class="btn-retour">Retour</button>
</div>

<script src="/profil.js"></script>
</body>
</html>
