<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Connexion</title>
    <link rel="stylesheet" href="/auth.css">
</head>
<body>

<div class="container">
    <h2>Connexion</h2>

    <form id="loginForm">
        <label for="login">Identifiant</label>
        <input type="text" id="login" placeholder="Identifiant" required>
        <label for="mdp">Mot de passe</label>
        <input type="password" id="mdp" placeholder="Mot de passe" required>
        <button type="submit">Se connecter</button>
    </form>

    <p id="message"></p>

    <p>Pas de compte ? <a href="/inscription.html">S'inscrire</a></p>
    <p><a href="/mdp_oublie.html">Mot de passe oublié ?</a></p>
</div>

<script src="connexion.js"></script>

</body>
</html>
