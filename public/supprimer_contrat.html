<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Supprimer des contrats</title>
</head>
<body>

<h1>Supprimer des contrats</h1>

<label>Recherche</label>
<input type="text" id="recherche" placeholder="Nom, montant ou description">
<button id="btnRechercher">Rechercher</button>
<button id="btnReset">Réinitialiser</button>

<br><br>

<p id="message"></p>

<h2>Résultats</h2>
<div id="liste"></div>

<br>

<h2>Contrats sélectionnés</h2>
<div id="selection"></div>

<br>

<button id="btnSupprimer">Supprimer les contrats sélectionnés</button>

<div id="confirmationBox" hidden>
    <p>Confirmer la suppression ?</p>
    <button id="btnOui">Oui</button>
    <button id="btnNon">Non</button>
</div>

<br><br>

<button onclick="window.location.href='/dashboard_admin.html'">Retour</button>

<script src="/supprimer_contrat.js"></script>

</body>
</html>
