<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Supprimer des contrats</title>
    <link rel="stylesheet" href="/supprimer_contrat.css">
</head>
<body>

<div class="page-container">
    <div class="page-header">
        <p class="page-label">Gestion des contrats</p>
        <h1>Supprimer des contrats</h1>
    </div>

    <section class="bloc-section">
        <h2>Recherche</h2>
        <div class="ligne-formulaire">
            <div class="champ-large">
                <label>Recherche</label>
                <input type="text" id="recherche" placeholder="Nom, montant ou description">
            </div>

            <button id="btnRechercher">Rechercher</button>
            <button id="btnReset" class="btn-secondary">Réinitialiser</button>
        </div>
    </section>

    <p id="message"></p>

    <section class="bloc-section">
        <h2>Résultats</h2>
        <div id="liste"></div>
    </section>

    <section class="bloc-section">
        <h2>Contrats sélectionnés</h2>
        <div id="selection"></div>
    </section>

    <div class="actions-bas">
        <button id="btnSupprimer" class="btn-danger">Supprimer les contrats sélectionnés</button>
        <button class="btn-retour" onclick="window.location.href='/dashboard_admin.html'">Retour</button>
    </div>

</div>

<div id="confirmationBox" class="confirmation-overlay" hidden>
    <div class="confirmation-panel">
        <div class="confirmation-header">
            <h2>Confirmation</h2>
        </div>

        <div class="confirmation-content">
            <p>Confirmer la suppression ?</p>
        </div>

        <div class="confirmation-actions">
            <button id="btnOui" class="btn-danger">Oui</button>
            <button id="btnNon" class="btn-secondary">Non</button>
        </div>
    </div>
</div>

<script src="/supprimer_contrat.js"></script>

</body>
</html>
