<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
</head>
<body>

<h1>Dashboard Administrateur</h1>

<p id="welcome"></p>

<button onclick="window.location.href='/creer_contrat.html'">Créer un contrat</button>
<br><br>

<button>Voir tous les contrats</button>
<br><br>

<button>Modifier un contrat</button>
<br><br>

<button>Supprimer un contrat</button>
<br><br>

<button onclick="window.location.href='/creer_fournisseur.html'">Gérer les fournisseurs</button>
<br><br>

<button onclick="window.location.href='/creer_type.html'">Gérer les types de contrat</button>
<br><br>

<button>Gérer les utilisateurs</button>
<br><br>

<button onclick="logout()">Se déconnecter</button>

<script>
    async function chargerUser() {
        const res = await fetch("http://localhost:3000/me");
        const user = await res.json();

        if (!user) {
            window.location.href = "/connexion.html";
        } else if (user.role !== 1) {
            window.location.href = "/dashboard_utilisateur.html";
        } else {
            document.getElementById("welcome").textContent = "Bienvenue " + user.identifiant;
        }
    }

    function logout() {
        fetch("http://localhost:3000/logout")
            .then(() => {
                window.location.href = "/connexion.html";
            });
    }

    chargerUser();
</script>

</body>
</html>
