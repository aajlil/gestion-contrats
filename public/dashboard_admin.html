<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="/alertes.css">
    <link rel="stylesheet" href="/dashboard.css">
</head>
<body>

<button id="btnMenu" class="btn-menu">☰</button>

<div id="menuOverlay" class="menu-overlay"></div>

<nav id="menuLateral" class="menu-lateral">
    <div class="menu-header">
        <h2>Menu</h2>
        <button id="btnFermerMenu" class="btn-fermer-menu">✕</button>
    </div>

    <button onclick="window.location.href='/profil.html'">Profil</button>
    <button onclick="window.location.href='/parametres.html'">Paramètres</button>
    <button id="btnLogoutMenu" class="btn-menu-danger">Se déconnecter</button>
</nav>

<div id="cloche-notif" onclick="ouvrirAlertes()" class="cloche-notif">
    <img src="/images/cloche.png" alt="Notifications">
</div>

<div id="alertes-overlay" class="alertes-overlay" style="display:none;">
    <div id="alertes-panel" class="alertes-panel">
        <div class="alertes-header">
            <span class="alertes-icon">
                <img src="/images/cloche.png" alt="Alertes">
            </span>
            <h2 class="alertes-titre">Alertes d'expiration</h2>
            <button class="alertes-close" onclick="fermerAlertes()">✕</button>
        </div>
        <div id="alertes-liste" class="alertes-liste"></div>
    </div>
</div>

<div class="dashboard-container">
    <div class="dashboard-header">
        <div>
            <p class="dashboard-label">Espace administrateur</p>
            <h1>Dashboard Administrateur</h1>
            <p id="welcome" class="dashboard-welcome"></p>
        </div>
    </div>

    <section class="dashboard-section">
        <h2>Vue d'ensemble</h2>
        <div class="dashboard-stats">
            <div class="dashboard-card">
                <span>Nombre total de contrats</span>
                <strong id="totalContrats">0</strong>
            </div>

            <div class="dashboard-card">
                <span>Contrats actifs</span>
                <strong id="contratsActifs">0</strong>
            </div>

            <div class="dashboard-card">
                <span>Contrats expirés</span>
                <strong id="contratsExpires">0</strong>
            </div>

            <div class="dashboard-card">
                <span>Contrats arrivant à échéance</span>
                <strong id="contratsEcheance">0</strong>
            </div>
        </div>

        <div class="graphique-box">
            <canvas id="graphiqueContrats"></canvas>
        </div>
    </section>

    <section class="dashboard-section">
        <h2>Statistiques</h2>
        <div class="dashboard-card montant-card">
            <span>Montant total des contrats</span>
            <strong><span id="montantTotal">0</span> EUR</strong>
        </div>

        <div class="dashboard-graph-grid">
            <div class="graphique-box graphique-fournisseurs">
                <h3>Contrats par fournisseur</h3>
                <canvas id="graphiqueFournisseurs"></canvas>
            </div>

            <div class="graphique-box graphique-petit">
                <h3>Contrats par type</h3>
                <canvas id="graphiqueTypes"></canvas>
            </div>
        </div>
    </section>

    <section class="dashboard-section">
        <h2>Actions</h2>
        <div class="dashboard-actions">
            <button onclick="window.location.href='/creer_contrat.html'">Créer un contrat</button>
            <button onclick="window.location.href='/voir_contrat_admin.html'">Voir tous les contrats</button>
            <button onclick="window.location.href='/modifier_contrat.html'">Modifier un contrat</button>
            <button onclick="window.location.href='/supprimer_contrat.html'">Supprimer un contrat</button>
            <button onclick="window.location.href='/creer_fournisseur.html'">Gérer les fournisseurs</button>
            <button onclick="window.location.href='/creer_type.html'">Gérer les types de contrat</button>
            <button onclick="window.location.href='/gerer_utilisateur.html'">Gérer les utilisateurs</button>
            <button onclick="window.location.href='/historique_contrat.html'">Voir l'historique</button>
            <button onclick="window.location.href='/gerer_document.html'">Gérer les documents</button>
            <button onclick="window.location.href='/calendrier_contrat.html'">Voir le calendrier des échéances</button>
        </div>
    </section>
    <button id="btnLogout" class="btn-logout">Se déconnecter</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="/alertes.js"></script>
<script src="/dashboard_admin.js"></script>

</body>
</html>
