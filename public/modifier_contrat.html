<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Modifier un contrat</title>
    <link rel="stylesheet" href="/modifier_contrat.css">
</head>
<body>

<div class="page-container">
    <div class="form-card">
        <div class="form-header">
            <p class="form-label">Gestion des contrats</p>
            <h1>Modifier un contrat</h1>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Nom</label>
                <input id="nom">
            </div>

            <div class="form-group">
                <label>Montant</label>
                <input id="montant" type="number">
            </div>

            <div class="form-group">
                <label>Date de début</label>
                <input id="date_debut" type="date">
            </div>

            <div class="form-group">
                <label>Date de fin</label>
                <input id="date_fin" type="date">
            </div>

            <div class="form-group form-large">
                <label>Description</label>
                <textarea id="description"></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button onclick="modifier()">Modifier</button>
            <button class="btn-secondary" onclick="window.location.href='/dashboard_admin.html'">Retour</button>
        </div>

        <p id="message"></p>
    </div>
</div>

<script src="modifier_contrat.js"></script>

</body>
</html>
