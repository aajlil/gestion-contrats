<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion des documents</title>
    <link rel="stylesheet" href="/gerer_document.css">
</head>
<body>

<div class="page-container">
    <div class="page-header">
        <p class="page-label">Documents</p>
        <h1>Gestion des documents</h1>
    </div>

    <p id="message"></p>

    <section class="bloc-section">
        <h2>Ajouter un document</h2>
        <p id="contratTitre" class="format-info"></p><br>
        <div class="form-grid">
            <div class="form-group">
                <label>Choisir un fichier</label>
                <input type="file" id="document">
            </div>
        </div>

        <p class="format-info">Formats autorisés : PDF, DOC, DOCX, JPG, JPEG, PNG</p>
        <div class="actions-ligne">
            <button id="btnUpload">Uploader</button>
            <button id="btnAfficher" class="btn-secondary">Afficher les documents</button>
        </div>
    </section>

    <section class="bloc-section">
        <h2>Documents du contrat</h2>
        <div id="liste"></div>
    </section>
    <button class="btn-retour" onclick="window.location.href='/dashboard_admin.html'">Retour</button>
</div>

<script src="gerer_document.js"></script>

</body>
</html>
