<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Inscription</title>
    <link rel="stylesheet" href="/auth.css">
</head>
<body>

<div class="container">
    <h2>Inscription</h2>
    <form id="registerForm">
        <label for="identifiant">Identifiant</label>
        <input type="text" id="identifiant" placeholder="Identifiant" required>
        <label for="nom">Nom</label>
        <input type="text" id="nom" placeholder="Nom" required>
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" placeholder="Prénom" required>
        <label for="email_inscription">Email</label>
        <input type="email" id="email_inscription" placeholder="Email" required>
        <label for="mdp">Mot de passe</label>
        <input type="password" id="mdp" placeholder="Mot de passe" required>
        <button type="submit">S'inscrire</button>
    </form>

    <p id="message"></p>

    <p>Déjà un compte ? <a href="/connexion.html">Se connecter</a></p>
</div>

<script src="inscription.js"></script>

</body>
</html>
