<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Nouveau mot de passe</title>
    <link rel="stylesheet" href="/auth.css">
</head>
<body>

<div class="container">
    <h2>Nouveau mot de passe</h2>
    <form id="resetForm">
        <label for="mdp">Nouveau mot de passe</label>
        <input type="password" id="mdp" placeholder="Nouveau mot de passe" required>

        <label for="confirmation">Confirmer le mot de passe</label>
        <input type="password" id="confirmation" placeholder="Confirmer le mot de passe" required>

        <button type="submit">Modifier</button>
    </form>

    <p id="message"></p>

    <p><a href="/connexion.html">Retour à la connexion</a></p>
</div>

<script src="/reset_mdp.js"></script>

</body>
</html>
